<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RKAR Seguros</title>

    <link rel="stylesheet" href="cotacao.css">
</head>
<body>

<section class="cotacao">

    <div class="overlay"></div>

    <div class="cotacao-container">

        <!-- ESQUERDA -->
        <div class="cotacao-info">

           <div class="item">
    <i>✔</i>
    <span>Cotação Instantânea</span>
</div>

            <h1>
                Proteja seu carro
                <span>com segurança.</span>
            </h1>

            <p>
                Faça sua cotação online com rapidez,
                segurança e atendimento especializado.
            </p>

            <div class="vantagens">

                <div class="item">
                    ✔ Cotação Instantânea
                </div>

                <div class="item">
                    ✔ Atendimento Especializado
                </div>

                <div class="item">
                    ✔ Mais de 12 seguradoras
                </div>

            </div>

        </div>

        <!-- DIREITA -->
        <div class="cotacao-box">

            <h2>Faça sua simulação</h2>

            <div class="linha"></div>

            <form id="formCotacao">

                <div class="input-box">
                    <label>Nome completo</label>
                    <input type="text" placeholder="Digite seu nome">
                </div>

                <div class="input-box">
                    <label>WhatsApp</label>
                    <input type="text" placeholder="(11) 99999-9999">
                </div>

                <div class="duplo">

                    <div class="input-box">
                        <label>Modelo</label>
                        <input type="text" placeholder="Ex: Civic">
                    </div>

                    <div class="input-box">
                        <label>Ano</label>
                        <input type="text" placeholder="2024">
                    </div>

                </div>

                <div class="input-box">
                    <label>CEP</label>
                    <input type="text" placeholder="00000-000">
                </div>

                <button type="submit">
                    SIMULAR AGORA
                </button>

            </form>

            <div class="loading" id="loading">
                <span></span>
                <p>Analisando perfil...</p>
            </div>

        </div>

    </div>

</section>

<script src="cotacao.js"></script>

</body>
</html>
